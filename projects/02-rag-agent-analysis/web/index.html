<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>LangGraph 分析引擎 · 智能诊断</title>
<link rel="stylesheet" href="../../shared.css">
<style>
  .graph-trace{display:flex;flex-wrap:wrap;gap:10px;margin:12px 0}
  .node{padding:8px 14px;border-radius:6px;font-size:13px;border:1px solid var(--line);background:var(--panel2);color:var(--mute)}
  .node.active{border-color:var(--accent);background:#0e2436;color:var(--accent)}
  .node.skipped{opacity:.35}
  .node.error{border-color:var(--danger);background:#241010;color:var(--danger)}
  .arrow{color:var(--mute);align-self:center}
  .ans-block{background:var(--panel2);border-left:3px solid var(--accent);padding:14px 18px;border-radius:6px;margin-bottom:10px}
  .ans-block .label{font-size:12px;color:var(--mute);letter-spacing:.1em;text-transform:uppercase;margin-bottom:6px}
  .evi{background:var(--code);border:1px solid var(--line);padding:8px 12px;border-radius:6px;margin:6px 0;font-size:13px;color:#c4cad6}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <h1>LangGraph 分析引擎 · 智能诊断</h1>
  <div class="right">
    <span class="demo-badge" id="modeBadge">Demo Mode</span>
    <a href="../../../">← 作品集主页</a>
    <a href="https://github.com/R-kvein/-portfolio/tree/main/projects/02-rag-agent-analysis" target="_blank">源码</a>
  </div>
</div>

<div class="metric-row">
  <div class="metric"><div class="n">+26%</div><div class="l">分析准确率</div></div>
  <div class="metric"><div class="n">5</div><div class="l">业务痛点工具</div></div>
  <div class="metric"><div class="n">~18%</div><div class="l">缓存命中率</div></div>
  <div class="metric"><div class="n">20+</div><div class="l">日活用户</div></div>
</div>

<div class="panel">
  <h3>提问</h3>
  <input type="text" id="q" placeholder="例如:订单 ORD8821 支付卡住了,该怎么办?" />
  <div class="row">
    <button class="btn" id="askBtn">开始分析</button>
    <button class="btn ghost" data-q="订单 ORD8821 支付卡住了,该怎么办?">示例 1</button>
    <button class="btn ghost" data-q="订单卡住了">示例 2(信息不足)</button>
    <button class="btn ghost" data-q="user_id 991 的退款是怎么处理的?">示例 3(缓存命中)</button>
  </div>
</div>

<div class="panel" id="resultPanel" style="display:none">
  <h2>状态图执行轨迹</h2>
  <div class="graph-trace" id="trace"></div>

  <h2 style="margin-top:24px">分析结果</h2>
  <div id="answer"></div>
</div>

<footer>
  状态图定义见源码 src/graph.py · 节点实现见 src/nodes/
</footer>
</div>

<script>
const API = window.location.origin.includes("github.io") ? null : "/analyze";

document.querySelectorAll("[data-q]").forEach(b => b.onclick = () => {
  document.getElementById("q").value = b.dataset.q;
});

const SCENARIOS = {
  "ord8821": {
    trace: ["parse", "cache", "retrieve", "assemble", "reason", "format"],
    answer: {
      reason: "payment-service 调用支付通道超时 30 秒,触发 order-service 的回滚机制,订单被置为 PAY_FAIL 但未给用户明确提示。",
      evidence: [
        "[hist_002] [order-service] ERROR 调用 payment 超时 30s, 订单 ORD8821",
        "[hist_001] 历史 case:支付超时通常由 payment-gw 上游不稳定引起",
        "[hist_003] 经验记录:重启 payment-gw 后通常 5 分钟内恢复"
      ],
      suggestions: [
        "立即重试订单 ORD8821(状态机已就绪,可走 /retry-pay)",
        "联系 payment-gw 团队确认上游链路状态",
        "若 10 分钟内未恢复,触发降级:转移到备用通道 stripe-fallback"
      ],
      citations: ["hist_001", "hist_002", "hist_003"],
      degraded: false
    },
    intent: "diagnose"
  },
  "incomplete": {
    trace: ["parse", "cache", "retrieve", "ask_user"],
    answer: {
      reason: "需要补充以下信息才能定位:订单号、时间范围",
      evidence: [],
      suggestions: ["提供具体订单号(如 ORDxxxx)", "提供问题发生的时间窗口"],
      citations: [],
      degraded: true
    },
    intent: "diagnose"
  },
  "cached": {
    trace: ["parse", "cache_hit", "format"],
    answer: {
      reason: "(命中缓存)退款审核流程:金额 >= 1000 元需要客服二次审核,< 1000 元自动通过。审核通过后原路退回,48 小时未到账自动触发对账。",
      evidence: ["[cache] 已被询问过 12 次,平均建议解决耗时 < 2min"],
      suggestions: ["客户金额 850 元 < 1000 阈值,系统已自动通过,可在退款日志查询到账状态"],
      citations: ["cache_hit"],
      degraded: false
    },
    intent: "suggest"
  }
};

function pickScenario(q) {
  q = q.toLowerCase();
  if (q.includes("ord8821") || q.includes("支付卡住")) return SCENARIOS.ord8821;
  if (q.length < 12) return SCENARIOS.incomplete;
  if (q.includes("退款") || q.includes("user_id")) return SCENARIOS.cached;
  return SCENARIOS.ord8821;
}

document.getElementById("askBtn").onclick = async () => {
  const q = document.getElementById("q").value.trim();
  if (!q) { alert("请输入问题"); return; }
  const btn = document.getElementById("askBtn");
  btn.disabled = true; btn.innerHTML = '<span class="spinner"></span> 分析中...';

  let result;
  try {
    if (API) {
      const resp = await fetch(API, {method: "POST", headers: {"Content-Type": "application/json"}, body: JSON.stringify({question: q})});
      result = await resp.json();
      result = {trace: ["parse", "cache", "retrieve", "assemble", "reason", "format"], answer: result.answer, intent: result.intent};
    } else {
      await new Promise(r => setTimeout(r, 1500));
      result = pickScenario(q);
    }
  } catch(e) {
    result = pickScenario(q);
  }

  renderTrace(result.trace);
  renderAnswer(result.answer, result.intent);
  btn.disabled = false; btn.textContent = "开始分析";
};

const ALL_NODES = ["parse", "cache", "retrieve", "assemble", "reason", "format", "ask_user"];

function renderTrace(activeNodes) {
  const box = document.getElementById("trace");
  document.getElementById("resultPanel").style.display = "block";
  box.innerHTML = "";
  const showNodes = activeNodes.includes("cache_hit") ? ["parse","cache_hit","format"] : activeNodes;
  showNodes.forEach((n, i) => {
    const el = document.createElement("div");
    el.className = "node active";
    el.textContent = n === "cache_hit" ? "cache (命中)" : n;
    box.appendChild(el);
    if (i < showNodes.length - 1) {
      const a = document.createElement("span");
      a.className = "arrow"; a.textContent = "→";
      box.appendChild(a);
    }
  });
}

function renderAnswer(ans, intent) {
  const box = document.getElementById("answer");
  box.innerHTML = `
    <div style="margin-bottom:12px"><span class="pill ${ans.degraded?'warn':'ok'}">${ans.degraded?'降级路径':'正常路径'}</span><span class="pill">意图:${intent}</span></div>
    <div class="ans-block">
      <div class="label">原因</div>
      <div>${escapeHtml(ans.reason)}</div>
    </div>
    <div class="ans-block">
      <div class="label">证据 (citations: ${(ans.citations||[]).map(c=>`<span class="cite">${c}</span>`).join('')})</div>
      ${(ans.evidence||[]).map(e=>`<div class="evi">${escapeHtml(e)}</div>`).join('')}
    </div>
    <div class="ans-block">
      <div class="label">建议步骤</div>
      <ol style="padding-left:20px">${(ans.suggestions||[]).map(s=>`<li>${escapeHtml(s)}</li>`).join('')}</ol>
    </div>
  `;
}

function escapeHtml(s){return String(s).replace(/[<>&]/g,c=>({'<':'&lt;','>':'&gt;','&':'&amp;'}[c]))}

if (API) document.getElementById("modeBadge").textContent = "Live API", document.getElementById("modeBadge").className = "demo-badge live";
</script>
</body>
</html>
