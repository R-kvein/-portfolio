<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>YOLOv8 检测 · 上传识别</title>
<link rel="stylesheet" href="../../shared.css">
<style>
  .dropzone{
    border:2px dashed var(--line);border-radius:12px;padding:48px 24px;text-align:center;
    color:var(--mute);cursor:pointer;transition:all .15s;background:var(--panel2)
  }
  .dropzone:hover, .dropzone.over{border-color:var(--accent);background:#0e2436;color:var(--accent)}
  .canvas-wrap{position:relative;display:inline-block;max-width:100%;border:1px solid var(--line);border-radius:8px;overflow:hidden;background:var(--code)}
  .canvas-wrap canvas, .canvas-wrap img{max-width:100%;height:auto;display:block}
  .det-list{display:grid;grid-template-columns:repeat(auto-fit,minmax(220px,1fr));gap:10px;margin-top:14px}
  .det-card{background:var(--panel2);border:1px solid var(--line);border-radius:8px;padding:12px 14px}
  .det-card .name{color:var(--accent);font-weight:600;font-size:14px}
  .det-card .conf{color:var(--accent2);font-size:12px;margin-left:6px}
  .det-card .bbox{color:var(--mute);font-size:11.5px;font-family:"SF Mono",monospace;margin-top:4px}
</style>
</head>
<body>
<div class="wrap">

<div class="topbar">
  <h1>YOLOv8 检测 · 上传识别</h1>
  <div class="right">
    <span class="demo-badge" id="modeBadge">Demo Mode</span>
    <a href="../../../">← 作品集主页</a>
    <a href="https://github.com/R-kvein/-portfolio/tree/main/projects/03-yolov8-vision" target="_blank">源码</a>
  </div>
</div>

<div class="metric-row">
  <div class="metric"><div class="n">0.83</div><div class="l">mAP@0.5</div></div>
  <div class="metric"><div class="n">0.61</div><div class="l">mAP@0.5:0.95</div></div>
  <div class="metric"><div class="n">~18ms</div><div class="l">GPU 单图延迟</div></div>
  <div class="metric"><div class="n">5</div><div class="l">类别(可扩展)</div></div>
</div>

<div class="panel">
  <h3>上传图片(或点击下方示例)</h3>
  <div class="dropzone" id="dropzone">
    <div style="font-size:32px;margin-bottom:8px">⤓</div>
    <div>拖入图片 或 <u>点击选择</u></div>
    <div style="font-size:12px;margin-top:6px;opacity:.7">支持 JPG / PNG / WebP</div>
    <input type="file" id="fileInput" accept="image/*" style="display:none">
  </div>
  <div class="row">
    <button class="btn ghost" id="demoBtn">用示例图(街景)</button>
    <span class="muted">演示模式下,检测结果为预设值,真实推理见源码 src/infer.py</span>
  </div>
</div>

<div class="panel" id="resultPanel" style="display:none">
  <h2>检测结果</h2>
  <div style="text-align:center">
    <div class="canvas-wrap">
      <canvas id="canvas"></canvas>
    </div>
  </div>
  <div class="det-list" id="detList"></div>
  <div style="margin-top:14px">
    <span class="pill ok" id="latencyPill"></span>
    <span class="pill" id="countPill"></span>
  </div>
</div>

<footer>
  Demo 检测结果为模拟数据 · 真实模型 best.pt 训练 100 epoch · mAP@0.5 = 0.83
</footer>
</div>

<script>
const API = window.location.origin.includes("github.io") ? null : "/detect";

const MOCK_DETS = [
  {cls: 0, name: "person",  conf: 0.94, bbox: [120, 180, 280, 520]},
  {cls: 0, name: "person",  conf: 0.88, bbox: [340, 190, 480, 510]},
  {cls: 1, name: "car",     conf: 0.91, bbox: [560, 280, 820, 460]},
  {cls: 2, name: "bicycle", conf: 0.76, bbox: [240, 380, 360, 540]},
];

const COLORS = ["#7cc4ff","#9eff9a","#ffb86b","#ff8baf","#c891ff"];

const dz = document.getElementById("dropzone");
const fi = document.getElementById("fileInput");
dz.onclick = () => fi.click();
dz.ondragover = e => { e.preventDefault(); dz.classList.add("over"); };
dz.ondragleave = () => dz.classList.remove("over");
dz.ondrop = e => {
  e.preventDefault(); dz.classList.remove("over");
  if (e.dataTransfer.files[0]) handleFile(e.dataTransfer.files[0]);
};
fi.onchange = () => fi.files[0] && handleFile(fi.files[0]);

document.getElementById("demoBtn").onclick = () => {
  // 用 SVG 生成一张街景示意图作为示例
  const svg = makeDemoSvg();
  const blob = new Blob([svg], {type: "image/svg+xml"});
  const url = URL.createObjectURL(blob);
  const img = new Image();
  img.onload = () => { drawAndDetect(img, MOCK_DETS, 18); URL.revokeObjectURL(url); };
  img.src = url;
};

async function handleFile(file) {
  const url = URL.createObjectURL(file);
  const img = new Image();
  img.onload = async () => {
    const t0 = performance.now();
    let dets;
    if (API) {
      const fd = new FormData(); fd.append("file", file);
      try {
        const resp = await fetch(API, {method:"POST", body: fd});
        const data = await resp.json();
        dets = data.detections;
      } catch(e) { dets = MOCK_DETS; }
    } else {
      await new Promise(r => setTimeout(r, 600));
      dets = scaleMockToImage(MOCK_DETS, img.width, img.height);
    }
    const latency = (performance.now() - t0).toFixed(0);
    drawAndDetect(img, dets, latency);
    URL.revokeObjectURL(url);
  };
  img.src = url;
}

function scaleMockToImage(dets, w, h) {
  const refW = 960, refH = 720;
  return dets.map(d => ({
    ...d,
    bbox: [d.bbox[0]/refW*w, d.bbox[1]/refH*h, d.bbox[2]/refW*w, d.bbox[3]/refH*h].map(x => Math.round(x))
  }));
}

function drawAndDetect(img, dets, latencyMs) {
  document.getElementById("resultPanel").style.display = "block";
  const canvas = document.getElementById("canvas");
  const ctx = canvas.getContext("2d");
  canvas.width = img.width; canvas.height = img.height;
  ctx.drawImage(img, 0, 0);

  dets.forEach(d => {
    const color = COLORS[d.cls % COLORS.length];
    const [x1, y1, x2, y2] = d.bbox;
    ctx.strokeStyle = color; ctx.lineWidth = 3;
    ctx.strokeRect(x1, y1, x2-x1, y2-y1);
    const label = `${d.name} ${d.conf.toFixed(2)}`;
    ctx.font = "14px -apple-system,sans-serif";
    const tw = ctx.measureText(label).width + 10;
    ctx.fillStyle = color;
    ctx.fillRect(x1, y1-22, tw, 22);
    ctx.fillStyle = "#0b0d12";
    ctx.fillText(label, x1+5, y1-6);
  });

  const list = document.getElementById("detList");
  list.innerHTML = "";
  dets.forEach(d => {
    const card = document.createElement("div");
    card.className = "det-card";
    card.innerHTML = `
      <div><span class="name">${d.name}</span><span class="conf">conf ${d.conf.toFixed(3)}</span></div>
      <div class="bbox">bbox: [${d.bbox.map(x=>Math.round(x)).join(", ")}]</div>
    `;
    list.appendChild(card);
  });

  document.getElementById("latencyPill").textContent = `推理延迟 ${latencyMs}ms`;
  document.getElementById("countPill").textContent = `检测到 ${dets.length} 个对象`;
}

function makeDemoSvg() {
  return `<svg xmlns="http://www.w3.org/2000/svg" width="960" height="720" viewBox="0 0 960 720">
    <defs>
      <linearGradient id="sky" x1="0" y1="0" x2="0" y2="1">
        <stop offset="0" stop-color="#3b5478"/>
        <stop offset="1" stop-color="#7a96b8"/>
      </linearGradient>
    </defs>
    <rect width="960" height="720" fill="url(#sky)"/>
    <!-- 路面 -->
    <rect y="500" width="960" height="220" fill="#3a3a3a"/>
    <rect y="550" width="960" height="6" fill="#888"/>
    <!-- 建筑 -->
    <rect x="0"   y="200" width="200" height="320" fill="#5a6378"/>
    <rect x="200" y="160" width="180" height="360" fill="#6a7388"/>
    <rect x="400" y="220" width="160" height="300" fill="#5a6378"/>
    <rect x="600" y="180" width="200" height="340" fill="#6a7388"/>
    <rect x="800" y="240" width="160" height="280" fill="#5a6378"/>
    <!-- 窗户 -->
    ${Array.from({length: 40}).map((_,i) => {
      const x = 30 + (i%8)*110, y = 230 + Math.floor(i/8)*60;
      return `<rect x="${x}" y="${y}" width="40" height="30" fill="#ffd166" opacity=".6"/>`;
    }).join("")}
    <!-- 行人 -->
    <g transform="translate(120, 180)">
      <circle cx="80" cy="40" r="22" fill="#e8c4a0"/>
      <rect x="60" y="60" width="40" height="100" fill="#d65555" rx="4"/>
      <rect x="60" y="160" width="18" height="180" fill="#333"/>
      <rect x="82" y="160" width="18" height="180" fill="#333"/>
    </g>
    <g transform="translate(340, 190)">
      <circle cx="70" cy="40" r="20" fill="#e8c4a0"/>
      <rect x="50" y="58" width="40" height="100" fill="#4a8aa8" rx="4"/>
      <rect x="50" y="158" width="18" height="160" fill="#222"/>
      <rect x="72" y="158" width="18" height="160" fill="#222"/>
    </g>
    <!-- 汽车 -->
    <g transform="translate(560, 280)">
      <rect x="0" y="60" width="260" height="100" fill="#c33" rx="12"/>
      <rect x="40" y="20" width="180" height="60" fill="#a22" rx="8"/>
      <circle cx="60" cy="170" r="22" fill="#222"/>
      <circle cx="200" cy="170" r="22" fill="#222"/>
      <rect x="50" y="30" width="70" height="40" fill="#88a" opacity=".7"/>
      <rect x="140" y="30" width="70" height="40" fill="#88a" opacity=".7"/>
    </g>
    <!-- 自行车 -->
    <g transform="translate(240, 380)">
      <circle cx="30" cy="120" r="40" fill="none" stroke="#222" stroke-width="6"/>
      <circle cx="90" cy="120" r="40" fill="none" stroke="#222" stroke-width="6"/>
      <line x1="30" y1="120" x2="90" y2="120" stroke="#222" stroke-width="4"/>
      <line x1="60" y1="80" x2="60" y2="120" stroke="#222" stroke-width="4"/>
      <line x1="60" y1="80" x2="80" y2="65" stroke="#222" stroke-width="4"/>
    </g>
  </svg>`;
}

if (API) document.getElementById("modeBadge").textContent = "Live API", document.getElementById("modeBadge").className = "demo-badge live";
</script>
</body>
</html>
